  /operations/nodes:
    get:
      operationId: operationNodes
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
        - name: after_node_key
          in: query
          schema:
            type: string
        - name: need_kind
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Node roster facts
          content:
            application/json:
              schema:
                $ref: ./operations/operations.nodes.response.schema.json
        "400":
          description: invalid_input
          content:
            application/json:
              schema:
                $ref: ./errors/error.response.schema.json
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: conflict
          content:
            application/json:
              schema:
                $ref: ./errors/error.response.schema.json
  /operations/instructions/pause:
    post:
      operationId: instructionPause
      parameters:
        - name: Operator-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: ./instructions/instruction.pause.request.schema.json
      responses:
        "200":
          description: Instruction applied
          content:
            application/json:
              schema:
                $ref: ./instructions/instruction.response.schema.json
        "400":
          description: invalid_input
          content:
            application/json:
              schema:
                $ref: ./errors/error.response.schema.json
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: precondition_failed or conflict
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: ./instructions/instruction.response.schema.json
                  - $ref: ./errors/error.response.schema.json
  /operations/instructions/release-expired-lease:
    post:
      operationId: instructionReleaseExpiredLease
      parameters:
        - name: Operator-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
