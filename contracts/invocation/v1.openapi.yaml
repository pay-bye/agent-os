        "409":
          description: precondition_failed or conflict
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: ./instructions/instruction.response.schema.json
                  - $ref: ./errors/error.response.schema.json
  /operations/instructions/force-release-lease:
