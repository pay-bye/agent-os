      operationId: operationItemJournal
      parameters:
        - name: work_item_id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: after_append_index
          in: query
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Work item journal metadata replay
          content:
            application/json:
              schema:
                $ref: ./operations/operations.item-journal.response.schema.json
        "400":
          description: invalid_input
          content:
            application/json:
              schema:
                $ref: ./errors/error.response.schema.json
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
