name: release agent-os

on:
  pull_request:
    paths:
      - go.mod
      - go.sum
      - cmd/**
      - contracts/**
      - docs/**
      - internal/**
      - quality/**
      - scripts/**
      - tests/**
      - company/software/agent-os/**
      - .github/workflows/release-agent-os.yml
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - go.mod
      - go.sum
      - cmd/**
      - contracts/**
      - docs/**
      - internal/**
      - quality/**
      - scripts/**
      - tests/**
      - company/software/agent-os/**
      - .github/workflows/release-agent-os.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.4"
  GORELEASER_VERSION: v2.16.0
  COSIGN_VERSION: v3.0.6
  SYFT_VERSION: v1.44.0

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Locate source
        id: source
        run: |
          if [[ -f go.mod ]]; then
            echo "root=." >> "$GITHUB_OUTPUT"
          else
            echo "root=company/software/agent-os" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ steps.source.outputs.root }}/go.sum
      - name: Install pinned Go shim
        run: |
          go install "golang.org/dl/go${GO_VERSION}@latest"
          "$(go env GOPATH)/bin/go${GO_VERSION}" download
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Install release tools
        run: |
          go install github.com/sigstore/cosign/v3/cmd/cosign@${COSIGN_VERSION}
          go install github.com/anchore/syft/cmd/syft@${SYFT_VERSION}
      - name: Verify source
        working-directory: ${{ steps.source.outputs.root }}
        run: ./scripts/verify.sh --unit
      - name: Check release config
        working-directory: ${{ steps.source.outputs.root }}
        run: ./scripts/release-check.sh --config
      - name: Snapshot release
        working-directory: ${{ steps.source.outputs.root }}
        run: ./scripts/release-check.sh --snapshot

  integration:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17.8-bookworm
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Locate source
        id: source
        run: |
          if [[ -f go.mod ]]; then
            echo "root=." >> "$GITHUB_OUTPUT"
          else
            echo "root=company/software/agent-os" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ steps.source.outputs.root }}/go.sum
      - name: Install pinned Go shim
        run: |
          go install "golang.org/dl/go${GO_VERSION}@latest"
          "$(go env GOPATH)/bin/go${GO_VERSION}" download
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Verify integration
        working-directory: ${{ steps.source.outputs.root }}
        run: ./scripts/verify.sh --integration
        env:
          CONTROL_PLANE_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable

  publish:
    needs:
      - check
      - integration
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v') && github.ref_protected == true && vars.PUBLIC_RELEASE_DESTINATIONS_READY == 'true'
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    environment: agent-os-release
    outputs:
      subjects: ${{ steps.subjects.outputs.base64 }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Locate source
        id: source
        run: |
          if [[ -f go.mod ]]; then
            echo "root=." >> "$GITHUB_OUTPUT"
          else
            echo "root=company/software/agent-os" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ steps.source.outputs.root }}/go.sum
      - name: Install pinned Go shim
        run: |
          go install "golang.org/dl/go${GO_VERSION}@latest"
          "$(go env GOPATH)/bin/go${GO_VERSION}" download
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Install release tools
        working-directory: ${{ steps.source.outputs.root }}
        run: |
          go install github.com/sigstore/cosign/v3/cmd/cosign@${COSIGN_VERSION}
          go install github.com/anchore/syft/cmd/syft@${SYFT_VERSION}
      - name: Check publish guard
        working-directory: ${{ steps.source.outputs.root }}
        run: ./scripts/release-check.sh --guard "${GITHUB_REF_NAME}"
        env:
          GITHUB_REF_PROTECTED: ${{ github.ref_protected }}
          PUBLIC_RELEASE_DESTINATIONS_READY: ${{ vars.PUBLIC_RELEASE_DESTINATIONS_READY }}
          PARITY_PROOF_URI: ${{ vars.PARITY_PROOF_URI }}
          PRODUCTION_EVIDENCE_URI: ${{ vars.PRODUCTION_EVIDENCE_URI }}
          DRIVER_EVIDENCE_URI: ${{ vars.DRIVER_EVIDENCE_URI }}
      - name: Release
        uses: goreleaser/goreleaser-action@v7.2.2
        with:
          distribution: goreleaser-pro
          version: ${{ env.GORELEASER_VERSION }}
          workdir: ${{ steps.source.outputs.root }}
          args: release --config quality/release/goreleaser.yaml --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          RELEASE_IMAGE_OWNER: ${{ vars.RELEASE_IMAGE_OWNER }}
          RELEASE_TAP_OWNER: ${{ vars.RELEASE_TAP_OWNER }}
          RELEASE_TAP_NAME: ${{ vars.RELEASE_TAP_NAME }}
          RELEASE_TAP_TOKEN: ${{ secrets.RELEASE_TAP_TOKEN }}
      - name: Generate subjects
        id: subjects
        working-directory: ${{ steps.source.outputs.root }}
        run: ./scripts/release-check.sh --subjects >> "$GITHUB_OUTPUT"
      - name: Attest archives and SBOMs
        uses: actions/attest@v4.1.0
        with:
          subject-checksums: ${{ steps.source.outputs.root }}/dist/release/checksums.txt
      - name: Attest digests
        uses: actions/attest@v4.1.0
        with:
          subject-checksums: ${{ steps.source.outputs.root }}/dist/release/digests.txt

  provenance:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v') && github.ref_protected == true && vars.PUBLIC_RELEASE_DESTINATIONS_READY == 'true'
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.publish.outputs.subjects }}
      upload-assets: true
